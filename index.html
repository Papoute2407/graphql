<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Zone 01 — Login</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="grid-bg"></div>

    <!-- Logo -->
    <div class="logo-area">
        <div class="logo-badge">
            <svg class="logo-hex" viewBox="0 0 32 32" fill="none">
                <polygon points="16,2 28,9 28,23 16,30 4,23 4,9"
                         fill="none" stroke="#0068c9" stroke-width="1.5"/>
                <polygon points="16,7 24,11.5 24,20.5 16,25 8,20.5 8,11.5"
                         fill="#0068c9" opacity="0.15"/>
                <text x="16" y="21" text-anchor="middle"
                      fill="#0068c9" font-size="11"
                      font-family="Courier New" font-weight="bold">01</text>
            </svg>
            <div>
                <div class="logo-text">Zone 01</div>
                <div class="logo-sub">Normandie</div>
            </div>
        </div>
    </div>

    <!-- Card -->
    <div class="card">
        <div class="card-header">
            <div class="prompt-line"><span>$</span> ./auth --connect</div>
            <div class="card-title">Authenticate</div>
        </div>

        <div class="field">
            <label>Identifiant</label>
            <div class="input-wrap">
                <span class="prefix">›</span>
                <input type="text" id="username"
                       placeholder="login ou email"
                       autocomplete="username"/>
            </div>
        </div>

        <div class="field">
            <label>Mot de passe</label>
            <div class="input-wrap">
                <span class="prefix">›</span>
                <input type="password" id="password"
                       placeholder="••••••••••"
                       autocomplete="current-password"/>
                <button class="toggle-pass" id="togglePass" tabindex="-1">[show]</button>
            </div>
        </div>

        <div class="error-box" id="errorBox">
            <span id="errorMsg">Identifiants invalides. Accès refusé.</span>
        </div>

        <button class="btn-login" id="loginBtn">
            [ Connexion ]
        </button>

        <div class="status-bar">
            <div class="status-text">
                <div class="status-dot"></div>
                ENDPOINT ACTIF
            </div>
            <div class="status-endpoint">zone01normandie.org</div>
        </div>
    </div>

    <script src="/js/password.js"></script>

</body>
</html>
